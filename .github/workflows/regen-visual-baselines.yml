# TEMPORARY — one-off workflow to regenerate the four visual-regression
# baselines on the Linux CI runner (Chromium shipped by Playwright 1.61.0),
# matching the environment scaffold-check compares against. Run via
# `gh workflow run regen-visual-baselines.yml --ref <branch>`, download the
# `visual-baselines` artifact, commit the PNGs under test/visual/baselines/,
# then delete this file. Not part of the normal CI surface.
name: regen-visual-baselines
on:
  workflow_dispatch:

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        timeout-minutes: 10
        env:
          DEBIAN_FRONTEND: noninteractive
        run: pnpm exec playwright install --with-deps chromium

      # UPDATE_BASELINES=1 makes the test write each captured PNG to its
      # baseline path and skip the diff (see sketch-regression.test.mjs).
      - name: Regenerate baselines (Linux + Chromium 1.61)
        env:
          UPDATE_BASELINES: '1'
        run: node --test test/visual/sketch-regression.test.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: test/visual/baselines/*.png
          if-no-files-found: error
