# .github/workflows/scaffold-check.yml
#
# Plan 02-02 Task 3 — CI gate that enforces the trust-model + scaffold
# invariants on every PR + push to main:
#   - SCAF-04: pnpm-lock.yaml frozen; no postinstall scripts (audit script
#     fails the build if any unallowlisted dep declares one)
#   - SCAF-05 / SCAF-09: lint rules ban raw fetch + raw <a href> in src/ui/
#   - SCAF-06 / COEXIST-01: CSS scope check — every theme.css selector
#     scoped under [data-clarity-surface]
#   - SCAF-07 / PITFALLS.md #1: use-poll terminal vs transient state machine
#     covered by node:test
#   - PRIM-01/02/03/04/05/06: shared primitives + worker handlers covered by
#     node:test
#   - All TypeScript compiles cleanly (tsc --noEmit)
#   - The plugin builds (worker.js + ui bundle + manifest.js emitted)
#
# Runs on every PR and on push to main. Cache pnpm store for speed.

name: scaffold-check
on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # Node 24 — the runtime the test suite actually requires. The .test.mjs
      # files import .ts source directly and rely on Node's native TypeScript
      # execution, which is default-on only on Node >=23.6; on Node 20 every
      # such import throws ERR_UNKNOWN_FILE_EXTENSION (174 files). This matches
      # local dev (node v24.x). The Playwright extraction hang that Node 24
      # exposed in playwright 1.55.1 is fixed by the bump to 1.61.0 (package.json).
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: install (frozen lockfile, scripts disabled via .npmrc)
        run: pnpm install --frozen-lockfile

      - name: postinstall audit (SCAF-04 / COEXIST-04)
        run: node scripts/audit-postinstall.mjs

      - name: CSS scope check (SCAF-06 / COEXIST-01)
        run: node scripts/check-css-scope.mjs

      - name: ESLint (SCAF-05 / SCAF-09) — src/ only; fixtures are deliberately bad and exercised by node:test
        run: npx eslint src/

      - name: typecheck
        run: pnpm typecheck

      # test/ui/chat-live-sticky.test.mjs is a Playwright-headless CSS
      # convergence gate (Plan 05-06 item e). Its header says CI is expected to
      # run it for real (it only self-skips when SKIP_VISUAL=1, which CI must
      # NOT set) — but the browser was never installed here, so it failed every
      # run. Install Chromium + its OS deps so the test runs as designed.
      # DEBIAN_FRONTEND=noninteractive keeps the `--with-deps` apt install from
      # blocking on a debconf prompt (it otherwise hangs the step). Playwright
      # 1.55.1 also hung extracting the browser archive on Node 24; the bump to
      # 1.61.0 resolves that. timeout-minutes bounds any future regression to
      # 10 min instead of the 6h job ceiling.
      - name: Install Playwright Chromium (chat-live-sticky convergence test needs a real browser)
        timeout-minutes: 10
        env:
          DEBIAN_FRONTEND: noninteractive
        run: pnpm exec playwright install --with-deps chromium

      # HYG-01 / D-03 — RECURSIVE glob is REQUIRED here. The old single-level
      # glob (test/{shared,worker,ui}/*.test.mjs) silently SKIPPED ~126 nested
      # tests (101 under test/worker/**, 25 under test/ui/**) so CI was green
      # only because those suites never ran. The recursive form mirrors the
      # package.json `test` script (node --test expands `**` itself) and makes
      # the green checkmark honest: it now runs the SC5 full surface × terminal-
      # kind matrix (test/worker/blocked-no-edge-verdict-consistency.test.mjs)
      # and the now-fixed watchdog + snapshot-prefetch tests in the nested dirs.
      # test/visual/sketch-regression.test.mjs is matched by test/** and runs
      # for real here (Chromium was installed above; CI must NOT set SKIP_VISUAL).
      #
      # The `**` is expanded by bash globstar (NOT node --test's own glob, which
      # only exists on Node >=21 — this CI runs Node 20, the project's target).
      # globstar makes the unquoted pattern expand to explicit file paths, which
      # `node --test` accepts on every Node version.
      - name: full recursive suite (shared + worker/** + ui/** incl. SC5 matrix + visual)
        shell: bash
        run: |
          shopt -s globstar
          node --test test/**/*.test.mjs

      # The safety-CLI harness suite lives OUTSIDE test/ (scripts/safety/test/**)
      # so it needs its own glob segment. It MUST run SERIALLY
      # (--test-concurrency=1): the PGlite/WASM-backed snapshot/restore/verify
      # files contend for shared temp + WASM resources under node --test's
      # default parallel scheduling, producing a flaky red (per Plan 20-01's
      # finding). Per-file and serial execution are deterministically green;
      # parallel is the only failing mode, so we pin concurrency to 1 here.
      - name: safety-CLI suite (serial — PGlite/WASM contention; Plan 20-01 finding)
        shell: bash
        run: |
          shopt -s globstar
          node --test --test-concurrency=1 scripts/safety/test/**/*.test.mjs

      - name: build (worker + ui + manifest)
        run: pnpm build
