                          - strong [ref=e5673]: "After (recommended, names the numbers):"
                        - blockquote [ref=e5674]:
                          - heading "How the ARE Score works" [level=2] [ref=e5675]
                          - paragraph [ref=e5676]:
                            - text: The
                            - strong [ref=e5677]: Agent Risk Exposure (ARE) Score
                            - text: is a 100-point insurance score across 25 risk dimensions in four pillars — Operational integrity (factuality, hallucination, citation, calibration), Bias & fairness (BBQ, DoNotAnswer, demographic parity, equal opportunity), Robustness (prompt injection, jailbreak, PII leakage, tool misuse, output-channel attacks), and Governance (kill switch, audit log, owner matrix, incident response, version control, eval cadence, PII handling attestation).
                          - paragraph [ref=e5678]:
                            - text: A single bind-time scan fires
                            - strong [ref=e5679]: 1,180 deterministic corpus probes
                            - text: (HaluEval, TruthfulQA, BBQ, DoNotAnswer, AdvBench, JailbreakBench, signed seed-42 packs) plus
                            - strong [ref=e5680]: 9 live scanner families
                            - text: "(Garak, PromptBench, HarmBench, AgentHarm, AgentDojo, LLM-Guard, JailbreakBench, AdvBench, Inspect) covering OWASP LLM Top-10, NIST AI RMF, MITRE ATLAS. Every probe and every score is reproducible: N=5 reproducibility = spread 0 is a CI gate before any rubric ships."
                          - paragraph [ref=e5681]:
                            - strong [ref=e5682]: Where it runs.
                            - text: The ARE Scanner runs inside
                            - emphasis [ref=e5683]: your
                            - text: environment. We ship a connector you install; the connector fires probes against your agent, your tools, and your real deployment context, and posts signed score envelopes back to our portal.
                            - strong [ref=e5684]: Your model, your tools, your secrets never leave your VPC.
                            - text: No competitor scanner runs this way.
                          - paragraph [ref=e5685]:
                            - strong [ref=e5686]: Turnaround.
                            - text: First scan in 24 hours. Re-scan on demand. Continuous re-scoring on a monthly cadence or on any model / control change.
                          - paragraph [ref=e5687]:
                            - strong [ref=e5688]: Audit trail.
                            - text: "Every scan envelope is hash-chained, signed by the scanner engineer key, and admitted into a tamper-evident portal audit log. The scoring engine is independently reproducible: clone the open methodology, point the connector at your agent, and reproduce every dim raw to the third decimal."
                          - paragraph [ref=e5689]: The score feeds underwriting, premium, coverage eligibility, and — uniquely — your claims trigger. If the same telemetry stream that re-scores your agent detects one of the six covered events (wrong-recipient action, unauthorized commitment, data leak, hallucination, prompt-injection compromise, regulatory response), we route to interim payout in one business day.
