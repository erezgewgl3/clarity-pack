                        - paragraph [ref=e5668]:
                          - strong [ref=e5669]: "Before (today, vague):"
                        - blockquote [ref=e5670]:
                          - paragraph [ref=e5671]: "\"Our ARE Score covers four areas: factuality, bias, robustness against attacks, and eval hygiene, producing an A–D band. The customer runs our test suite against their agent in their own environment.\""
