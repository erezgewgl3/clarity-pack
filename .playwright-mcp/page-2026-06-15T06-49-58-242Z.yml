                      - heading "Prompt for CEO — Close the Scanning-Capability Gap" [level=1] [ref=e2158]
                      - separator [ref=e2159]
                      - paragraph [ref=e5869]:
                        - text: "You are the CEO of Backbond. Your task: produce a"
                        - strong [ref=e5870]: scanning-capability gap-closure plan
                        - text: that brings our ARE Scanner to at least parity with what our closest competitors offer, so that no prospect ever chooses them because their scan looks deeper than ours.
                      - heading "Context — what we have today" [level=2] [ref=e2162]
                      - paragraph [ref=e5871]:
                        - text: "Our ARE Score covers four areas:"
                        - strong [ref=e5872]: factuality, bias, robustness against attacks, and eval hygiene
                        - text: ", producing an A–D band. The customer runs our test suite against their agent in their own environment. Scoring is point-in-time at bind; no published re-scoring cadence, no continuous monitoring, no public certification badge."
                      - heading "Context — what competitors publicly offer (verified June 2026)" [level=2] [ref=e2165]
                      - paragraph [ref=e5873]:
                        - strong [ref=e5874]: Klaimee
                        - text: "(YC, agent-native): three-block assessment — (1) public-data scan of the agent, (2) 30-question governance assessment, (3) behavioral testing firing"
                        - strong [ref=e5875]: 100+ probes
                        - text: "covering prompt injection, jailbreak, decision drift, data leakage, and biased outputs. Scores each agent across 8 dimensions. Outputs: risk score, detailed evaluation report, remediation recommendations, \"Klaimee Certified\" badge, proof of certification for enterprise procurement. Free adversarial-testing playground. Annual re-certification and continuous risk monitoring for enterprise. 24h turnaround claim; 7-minute application."
                      - paragraph [ref=e5876]:
                        - strong [ref=e5877]: Mount
                        - text: "(YC, agent-native): automated red-teaming plus manual analysis across"
                        - strong [ref=e5878]: 6 attack surfaces
                        - text: "— prompt injection, excessive permissions, data exposure, unauthorized actions, weak oversight (approval gates/audit trails/rollback), tool & dependency risk. Underwrites the real deployment: what the agent can do, access, and what controls exist. Results in 48 hours: risk score, ranked vulnerabilities, exact fixes. \"ADR certification (the SOC 2 for AI agents).\" Continuous monitoring, real-time vulnerability scanning, and behavioral logging feed dynamic pricing — they call this their data moat. Free agent test as the top-of-funnel."
                      - paragraph [ref=e5879]:
                        - strong [ref=e5880]: AIUC
                        - text: "(benchmark, best-funded): AIUC-1 certification built on NIST AI RMF, EU AI Act, MITRE ATLAS;"
                        - strong [ref=e5881]: 5,000+ adversarial simulations
                        - text: per certification; MITRE as technical contributor; Schellman as accredited independent auditor.
                      - paragraph [ref=e5882]:
                        - strong [ref=e5883]: Armilla
                        - text: "(benchmark, Lloyd's): independent AI system certification included with every policy; 500+ AI evaluations performed; trigger tied to measured model degradation (e.g., accuracy falling 95%→85%), which requires baseline performance benchmarking at bind."
                      - heading "Your task" [level=2] [ref=e2177]
                      - paragraph [ref=e5884]: "Deliver a plan with these five sections:"
                      - list [ref=e2179]:
                        - listitem [ref=e5885]:
                          - paragraph [ref=e5886]:
                            - strong [ref=e5887]: Gap matrix.
                            - text: "ARE Scanner vs. Klaimee vs. Mount (with AIUC/Armilla as the bar for where the market is heading) across every scanning dimension: attack-surface coverage (prompt injection, jailbreak, data leakage, decision drift, excessive permissions, tool/dependency risk, oversight controls), probe volume, governance assessment, public-data scan, deployment-context underwriting (permissions/tools/HITL), continuous monitoring, re-scoring cadence, turnaround time, self-serve experience, free testing tier, certification badge, independent auditor, framework mapping (NIST AI RMF, EU AI Act, MITRE ATLAS, OWASP LLM Top 10). For each cell:"
                            - strong [ref=e5888]: Have / Partial / Missing
                            - text: ", with one line of evidence."
                        - listitem [ref=e5889]:
                          - paragraph [ref=e5890]:
                            - strong [ref=e5891]: Parity backlog.
                            - text: "For every Missing or Partial item, a build ticket: what exactly to build, effort estimate (S/M/L), dependency, and who owns it (CTO/underwriting/product). Prioritize by (a) what prospects will compare side-by-side in a sales process, (b) what reinsurers will ask for in capacity diligence."
                        - listitem [ref=e5892]:
                          - paragraph [ref=e5893]:
                            - strong [ref=e5894]: Leapfrog shortlist.
                            - text: "Three capabilities that would put us AHEAD, not just at parity — judged against our strategy (pay-per-call pricing, log-based claims triggers, 1-day interim payout). Candidates to evaluate: scanning that runs in the customer's environment (we already do this — weaponize the privacy/security angle), probe count and attack-surface breadth exceeding Klaimee's 100+, continuous log-based telemetry that feeds BOTH re-pricing and instant claims verification (Mount monitors but doesn't connect it to payout speed), and an independent-auditor partnership (the AIUC/Schellman move — neither Klaimee nor Mount has one)."
                        - listitem [ref=e5895]:
                          - paragraph [ref=e5896]:
                            - strong [ref=e5897]: Messaging update.
                            - text: Rewrite the "How the ARE Score works" section of the one-pager so a buyer comparing us against Klaimee's and Mount's scan descriptions sees us as equal or better. State probe counts, attack surfaces, frameworks, and turnaround explicitly — vagueness loses comparisons.
                        - listitem [ref=e5898]:
                          - paragraph [ref=e5899]:
                            - strong [ref=e5900]: 30/60/90 plan.
                            - text: What ships in 30 days (must be enough for side-by-side parity in a live deal), 60, and 90. One owner and one measurable exit criterion per item.
