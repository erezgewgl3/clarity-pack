                            - strong [ref=e5873]: Have / Partial / Missing
                            - text: ", with one line of evidence."
                        - listitem [ref=e5874]:
                          - paragraph [ref=e5875]:
                            - strong [ref=e5876]: Parity backlog.
                            - text: "For every Missing or Partial item, a build ticket: what exactly to build, effort estimate (S/M/L), dependency, and who owns it (CTO/underwriting/product). Prioritize by (a) what prospects will compare side-by-side in a sales process, (b) what reinsurers will ask for in capacity diligence."
                        - listitem [ref=e5877]:
                          - paragraph [ref=e5878]:
                            - strong [ref=e5879]: Leapfrog shortlist.
                            - text: "Three capabilities that would put us AHEAD, not just at parity — judged against our strategy (pay-per-call pricing, log-based claims triggers, 1-day interim payout). Candidates to evaluate: scanning that runs in the customer's environment (we already do this — weaponize the privacy/security angle), probe count and attack-surface breadth exceeding Klaimee's 100+, continuous log-based telemetry that feeds BOTH re-pricing and instant claims verification (Mount monitors but doesn't connect it to payout speed), and an independent-auditor partnership (the AIUC/Schellman move — neither Klaimee nor Mount has one)."
